services:
  webhook-ingress:
    ports:
      - "8012:8001"
    environment:
      APP_BASE_URL: http://127.0.0.1:8011
      QUEUE_BACKEND: sqlite
      DATABASE_URL: sqlite:////workspace/promptdrift.db
      AUDIT_DB_PATH: /workspace/promptdrift.db
    volumes:
      - ./:/workspace

  worker:
    environment:
      APP_BASE_URL: http://127.0.0.1:8011
      QUEUE_BACKEND: sqlite
      DATABASE_URL: sqlite:////workspace/promptdrift.db
      AUDIT_DB_PATH: /workspace/promptdrift.db
    volumes:
      - ./:/workspace

  api:
    ports:
      - "8011:8002"
    environment:
      APP_BASE_URL: http://127.0.0.1:8011
      DATABASE_URL: sqlite:////workspace/promptdrift.db
      AUDIT_DB_PATH: /workspace/promptdrift.db
      GITHUB_APP_ID: ""
      GITHUB_PRIVATE_KEY_PATH: ""
      GITHUB_APP_PRIVATE_KEY: ""
    volumes:
      - ./:/workspace