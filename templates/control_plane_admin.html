<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Vipari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/control-plane.css" />
    <script defer src="/static/theme-toggle.js"></script>
</head>
<body data-theme="dark">
    <main class="page-shell admin-shell">
        <section class="page-header">
            <p class="eyebrow">Admin</p>
            <h1>Control-plane oversight</h1>
            <p>Signed in as {{ACTOR_GITHUB_LOGIN}}. This page is owner-locked and only available to the configured system owner identity.</p>
            <div class="state-links">{{QUICK_LINKS}}</div>
        </section>
        {{ADMIN_TABS}}
        {{STATUS_NOTE}}
        {{ADMIN_CONTENT}}
    </main>
    <div class="theme-toggle-shell">
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch to light mode" aria-pressed="true">
            <span class="theme-toggle-icon" aria-hidden="true">☀</span>
            <span class="theme-toggle-label" data-theme-toggle-label>Dark mode</span>
            <span class="theme-toggle-icon" aria-hidden="true">☾</span>
        </button>
    </div>
</body>
</html>
